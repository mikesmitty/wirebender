name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: cmd/servotest/go.mod
      - name: Run unit tests
        run: cd cmd/servotest && go test -v ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Vet packages
        run: go vet ./pkg/...

  vet-dxf2bend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: cmd/dxf2bend/go.mod
      - name: Vet dxf2bend
        run: cd cmd/dxf2bend && go vet ./...

  build-dxf2bend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: cmd/dxf2bend/go.mod
      - name: Build dxf2bend
        run: cd cmd/dxf2bend && go build -o /dev/null .

  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install TinyGo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --pattern '*amd64.deb' --repo tinygo-org/tinygo
          sudo dpkg -i tinygo_*.deb
      - name: Build firmware
        run: make build
