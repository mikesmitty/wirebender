name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/servotest/go.mod
      - name: Run unit tests
        run: cd cmd/servotest && go test -v ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet dxf2bend
        run: go vet ./cmd/dxf2bend/...
      - name: Vet packages
        run: go vet ./pkg/...

  build-dxf2bend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build dxf2bend
        run: go build -o /dev/null ./cmd/dxf2bend/

  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: 0.37.0
      - name: Build firmware
        run: tinygo build -target=pico2 -o build.elf .
